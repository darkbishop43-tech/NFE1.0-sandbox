<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFE Sandbox V3</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f5f5f2; color:#222; }
    header { background:#111; color:white; padding:24px; text-align:center; }
    .container { max-width:900px; margin:30px auto; padding:20px; }
    .card { background:white; border-radius:12px; padding:22px; box-shadow:0 2px 8px rgba(0,0,0,.08); margin-bottom:20px; }
    textarea, select { width:100%; padding:12px; font-size:16px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
    textarea { min-height:140px; }
    button { background:#111; color:white; border:none; padding:12px 18px; border-radius:8px; font-size:16px; cursor:pointer; margin-top:15px; }
    button:hover { background:#333; }
    pre { white-space:pre-wrap; background:#f0f0f0; padding:16px; border-radius:8px; }
    .small { color:#666; font-size:14px; }
  </style>
</head>
<body>

<header>
  <h1>NFE Sandbox V3</h1>
  <p>Input → Mode → Run NFE → Structured Output</p>
</header>

<div class="container">

  <div class="card">
    <h2>Input</h2>
    <textarea id="userInput" placeholder="Type anything here..."></textarea>

    <h3>Mode</h3>
    <select id="mode">
      <option value="creative">Creative</option>
      <option value="advanced">Advanced Analysis</option>
    </select>

    <button onclick="runNFE()">Run NFE</button>
    <p class="small">Creative = stories, jokes, skits, scenes. Advanced = analysis with guardrails.</p>
  </div>

  <div class="card" id="outputCard" style="display:none;">
    <h2>NFE Output</h2>
    <pre id="output"></pre>
    <button onclick="copyOutput()">Copy Output</button>
  </div>

</div>

<script>
  async function runNFE() {
    const input = document.getElementById("userInput").value.trim();
    const mode = document.getElementById("mode").value;
    const outputCard = document.getElementById("outputCard");
    const output = document.getElementById("output");

    if (!input) {
      alert("Type something first.");
      return;
    }

    outputCard.style.display = "block";
    output.innerText = "Running NFE...";

    try {
      const res = await fetch("/api/nfe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input, mode })
      });

      const data = await res.json();

      if (!res.ok) {
        output.innerText = "Error:\n" + (data.error || "Something went wrong.");
        return;
      }

      output.innerText = data.result;
    } catch (err) {
      output.innerText = "Network error. Check Vercel deployment and api/nfe.js.";
    }
  }

  function copyOutput() {
    navigator.clipboard.writeText(document.getElementById("output").innerText);
    alert("Copied.");
  }
</script>

</body>
</html>
