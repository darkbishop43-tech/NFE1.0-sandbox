<!DOCTYPE html>
<html>
<head>
<title>NFE Sandbox</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  max-width:1000px;
  margin:auto;
  padding:20px;
}

textarea{
  width:100%;
  height:150px;
  background:#1e293b;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.card{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:8px;
}

h2{
  color:#39D0C5;
}

label{
  display:block;
  margin:5px 0;
}
</style>
</head>

<body>

<h1>Narrative Fuel Engine Sandbox</h1>
<p>This is the NFE UI shell. It records input, fuel, classification, and sandbox notes. It does not replace the real NFE engine.</p>

<textarea id="input" placeholder="Describe a situation, test case, story idea, or sandbox result..."></textarea>

<div class="card">
<h3>Fuel Type</h3>
<label><input type="checkbox" name="fuel" value="Identity"> Identity</label>
<label><input type="checkbox" name="fuel" value="Incentive"> Incentive</label>
<label><input type="checkbox" name="fuel" value="Territory"> Territory</label>
<label><input type="checkbox" name="fuel" value="Expectation"> Expectation</label>
<label><input type="checkbox" name="fuel" value="Contradiction"> Contradiction</label>
<label><input type="checkbox" name="fuel" value="Fear"> Fear</label>
</div>

<div class="card">
<h3>Classification</h3>
<label><input name="classification" type="radio" value="Interesting Observation"> Interesting Observation</label>
<label><input name="classification" type="radio" value="Candidate Discovery"> Candidate Discovery</label>
<label><input name="classification" type="radio" value="Requires Testing"> Requires Testing</label>
<label><input name="classification" type="radio" value="Likely Existing Explanation"> Likely Existing Explanation</label>
<label><input name="classification" type="radio" value="Likely NFE Drift"> Likely NFE Drift</label>
<label><input name="classification" type="radio" value="Not Significant"> Not Significant</label>
</div>

<div class="card">
<h3>Sandbox Notes</h3>
<textarea id="notes" placeholder="Paste Grok, Gemini, Claude, ChatGPT, or human test notes here..."></textarea>
</div>

<button onclick="analyze()">Run UI Capture</button>

<div id="results"></div>

<script>
function getChecked(name){
  return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`))
    .map(item => item.value);
}

function analyze(){

  const text = document.getElementById("input").value;
  const notes = document.getElementById("notes").value;
  const fuels = getChecked("fuel");
  const classificationList = getChecked("classification");
  const classification = classificationList.length ? classificationList[0] : "No classification selected";

  document.getElementById("results").innerHTML = `

  <div class="card">
    <h2>Reality / Test Input</h2>
    <p>${text || "No input entered."}</p>
  </div>

  <div class="card">
    <h2>Fuel Selected</h2>
    <p>${fuels.length ? fuels.join(", ") : "No fuel selected."}</p>
  </div>

  <div class="card">
    <h2>Classification</h2>
    <p>${classification}</p>
  </div>

  <div class="card">
    <h2>Sandbox Notes</h2>
    <p>${notes || "No sandbox notes entered."}</p>
  </div>

  <div class="card">
    <h2>Drift Check</h2>
    <p>UI capture only. This page is not pretending to be the full NFE engine.</p>
  </div>

  <div class="card">
    <h2>Engine Status</h2>
    <p>NFE Sandbox UI is working. Input, fuel, classification, and notes were captured.</p>
  </div>

  `;
}
</script>

</body>
</html>
