</html><!DOCTYPE html>

<html>

<head>
<title>NFE Sandbox</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
max-width:1000px;
margin:auto;
padding:20px;
}

textarea{
width:100%;
height:150px;
background:#1e293b;
color:white;
border:none;
padding:10px;
border-radius:8px;
}

button{
margin-top:10px;
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:8px;
}

h2{
color:#39D0C5;
}

</style>

</head>

<body>

<h1>Narrative Fuel Engine Sandbox</h1>

<textarea id="input"
placeholder="Describe a situation..."></textarea>

<br>

<button onclick="analyze()">
Run Analysis
</button>

<div id="results"></div>

<script>

function analyze(){

const text =
document.getElementById("input").value;

document.getElementById("results").innerHTML = `

<div class="card">
<h2>Reality</h2>
${text}
</div>

<div class="card">
<h2>Fuel</h2>
Assumptions, expectations, incentives, identities.
</div>

<div class="card">
<h2>Interpretations</h2>
Multiple narrative engines may explain this situation.
</div>

<div class="card">
<h2>Collision</h2>
Potential conflict between competing interpretations.
</div>

<div class="card">
<h2>Pressure</h2>
What forces are increasing tension?
</div>

<div class="card">
<h2>Alpha Recommendation</h2>
Gather more evidence before promoting any explanation.
</div>

`;

}

</script>

</body>

</html>
