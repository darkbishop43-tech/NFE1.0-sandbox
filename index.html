<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFE Sandbox</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f2;
      color: #222;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .fuels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    label {
      background: #eee;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #333;
    }

    .result-section {
      border-left: 4px solid #111;
      padding-left: 12px;
      margin-bottom: 15px;
    }

    .small {
      font-size: 14px;
      color: #666;
    }

    pre {
      white-space: pre-wrap;
      background: #f0f0f0;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>Narrative Fuel Engine Sandbox</h1>
  <p>Test reality inputs, fuel selection, salience, pressure, collision, and Anti-NFE.</p>
</header>

<div class="container">

  <div class="card">
    <h2>Reality / Test Input</h2>
    <textarea id="realityInput" placeholder="Example: A small business owner publicly apologizes after customers accuse the company of betraying its values."></textarea>

    <h3>Select Fuel</h3>
    <div class="fuels">
      <label><input type="checkbox" value="Grievance"> Grievance</label>
      <label><input type="checkbox" value="Desire"> Desire</label>
      <label><input type="checkbox" value="Fear"> Fear</label>
      <label><input type="checkbox" value="Identity"> Identity</label>
      <label><input type="checkbox" value="Stake"> Stake</label>
      <label><input type="checkbox" value="Contradiction"> Contradiction</label>
      <label><input type="checkbox" value="Expectation"> Expectation</label>
      <label><input type="checkbox" value="Territory"> Territory</label>
    </div>

    <button onclick="runNFE()">Run NFE Test</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <div class="card" id="results" style="display:none;">
    <h2>NFE Analysis Output</h2>

    <div class="result-section">
      <h3>Reality</h3>
      <p id="realityOutput"></p>
    </div>

    <div class="result-section">
      <h3>Fuel Inventory</h3>
      <p id="fuelOutput"></p>
    </div>

    <div class="result-section">
      <h3>Engine Read</h3>
      <p id="engineOutput"></p>
    </div>

    <div class="result-section">
      <h3>Salience / Pressure</h3>
      <p id="salienceOutput"></p>
    </div>

    <div class="result-section">
      <h3>Collision</h3>
      <p id="collisionOutput"></p>
    </div>

    <div class="result-section">
      <h3>Dominance / New Reality</h3>
      <p id="dominanceOutput"></p>
    </div>

    <div class="result-section">
      <h3>Anti-NFE</h3>
      <p id="antiOutput"></p>
    </div>

    <div class="result-section">
      <h3>Promotion Status</h3>
      <p id="statusOutput"></p>
    </div>

    <button onclick="copyResults()">Copy Results</button>
  </div>

</div>

<script>
  function runNFE() {
    const input = document.getElementById("realityInput").value.trim();
    const checked = Array.from(document.querySelectorAll("input[type='checkbox']:checked"))
      .map(box => box.value);

    if (!input) {
      alert("Add a reality / test input first.");
      return;
    }

    if (checked.length === 0) {
      alert("Select at least one fuel.");
      return;
    }

    const fuelText = checked.join(", ");

    document.getElementById("results").style.display = "block";

    document.getElementById("realityOutput").innerText = input;

    document.getElementById("fuelOutput").innerText =
      "Selected fuel: " + fuelText + ".";

    document.getElementById("engineOutput").innerText =
      "The engine reads this scenario as a situation where " + fuelText +
      " may be shaping how the event is interpreted. The core question is: what does this input make important?";

    document.getElementById("salienceOutput").innerText =
      "Pressure test: identify which selected fuel becomes louder under stress. If one fuel starts crowding out the others, mark it as rising salience.";

    document.getElementById("collisionOutput").innerText =
      "Collision test: look for competing interpretations of the same reality. If two engines explain the same event in incompatible ways, mark the collision zone.";

    document.getElementById("dominanceOutput").innerText =
      "Dominance is not locked. This output is a test read only. Ask which interpretation is gaining ground, which is losing fuel, and what new reality would emerge if the dominant engine keeps winning.";

    document.getElementById("antiOutput").innerText =
      "Anti-NFE check: this may not be a narrative problem. Structural, economic, technical, random, or material causes may explain the event better than fuel or engines.";

    document.getElementById("statusOutput").innerText =
      "TEST ONLY — not a locked discovery. Requires repeated testing, Anti-NFE review, and ledger tracking before promotion.";
  }

  function clearAll() {
    document.getElementById("realityInput").value = "";
    document.querySelectorAll("input[type='checkbox']").forEach(box => box.checked = false);
    document.getElementById("results").style.display = "none";
  }

  function copyResults() {
    const text = `
NFE SANDBOX TEST

Reality:
${document.getElementById("realityOutput").innerText}

Fuel Inventory:
${document.getElementById("fuelOutput").innerText}

Engine Read:
${document.getElementById("engineOutput").innerText}

Salience / Pressure:
${document.getElementById("salienceOutput").innerText}

Collision:
${document.getElementById("collisionOutput").innerText}

Dominance / New Reality:
${document.getElementById("dominanceOutput").innerText}

Anti-NFE:
${document.getElementById("antiOutput").innerText}

Promotion Status:
${document.getElementById("statusOutput").innerText}
    `;

    navigator.clipboard.writeText(text);
    alert("Results copied.");
  }
</script>

</body>
</html>
